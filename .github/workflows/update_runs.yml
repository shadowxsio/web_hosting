name: Daily Data Fetch

on:
  schedule:
    - cron: '0 8 * * *' # Tous les jours à 8h UTC
  workflow_dispatch: # Permet de le lancer manuellement depuis l'interface GitHub

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Run fetch script
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: python scripts/fetch_runs.py
        
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/runs.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update runs data from Sportstats and Strava" && git push)
