experiences:
  - role: "Spécialiste Plateforme Google Cloud"
    company: "Desjardins"
    period: "Juin 2024 – Présent"
    location: "Montréal, QC (Hybride)"
    bullets:
      - "Architecture GCP : Administration de l'organisation GCP (nombreux projets actifs, multiples équipes). Gestion centralisée des Org Policies, IAM, activation des APIs clients. Conception de Landing Zones conformes aux exigences bancaires."
      - "Réseau & Sécurité : Architecture Hub & Spoke avec Interconnect (plusieurs VPCs). Mise en place VPC-SC (périmètres de sécurité), Shared VPC, Serverless VPC Access. Suivi conformité CIS Benchmark. Sécurité réseau Zero-Trust."
      - "CI/CD : Pilotage de la migration des pipelines Concourse → GitHub Actions. Standardisation des workflows de déploiement, Gitflow branching strategy, intégration des tests automatisés et validations pré-déploiement."
      - "IaC : Terraform (gestion de nombreuses ressources), configuration via tfvars et YAML. Modules CDKTF pour l'abstraction. Terraform Cloud pour gestion d'état, collaboration et gouvernance modulaire."
      - "Observabilité : Dashboards Cloud Monitoring/Logging, alerting personnalisé, suivi SLO/SLA. Intégration WIZ pour la posture de sécurité cloud."
      - "Opérations : Méthodologie Agile (Sprints 2 semaines), astreintes 24/7, stabilisation et amélioration continue de la production."
