<!DOCTYPE html>
<html lang="fr-CA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes courses - Mickaël Gauvrit</title>
    <!-- MANDATORY: Declare support for both light and dark themes -->
    <meta name="color-scheme" content="light dark">
    <meta name="description" content="Courses et records personnels de Mickaël Gauvrit">
    
    <!-- Google Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated background blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="container">
        <header class="liquid-panel main-header">
            <div class="header-content">
                <h1>Mes courses</h1>
                <p class="subtitle">Coureur amateur à mes heures perdues, j'essaye de transmettre le virus<br><strong>Objectif MIUT 2028</strong></p>
                
                <div class="social-links">
                    <a href="https://www.strava.com/athletes/46325892" target="_blank" rel="noopener noreferrer" class="social-btn strava" aria-label="Strava">
                        <i class="fa-brands fa-strava"></i>
                    </a>
                    <a href="https://www.instagram.com/shadowxsio?igsh=MTRsdzVhdzdib3J6bA%3D%3D&utm_source=qr" target="_blank" rel="noopener noreferrer" class="social-btn instagram" aria-label="Instagram">
                        <i class="fa-brands fa-instagram"></i>
                    </a>
                </div>
            </div>
            
            <nav class="tabs-nav">
                <button class="tab-btn active" data-target="prs-section">🏆 Mes Records</button>
                <button class="tab-btn" data-target="runs-section">🏁 Historique</button>
            </nav>
        </header>

        <main class="content-area">
            <!-- Section PRs -->
            <section id="prs-section" class="tab-content active liquid-panel">
                <div class="pr-grid" id="pr-container">
                    <!-- PR cards will be injected here -->
                    <div class="loading">Calcul des records...</div>
                </div>
            </section>

            <!-- Section Historique -->
            <section id="runs-section" class="tab-content">
                <div class="filter-container">
                    <label for="year-filter">Année :</label>
                    <select id="year-filter">
                        <option value="all">Toutes</option>
                        <!-- Options generated by JS -->
                    </select>
                </div>
                <div id="runs-container" class="runs-list">
                    <!-- Runs will be injected here -->
                    <div class="loading">Chargement de l'historique...</div>
                </div>
            </section>
        </main>
        
        <footer class="liquid-panel">
            <p>Propulsé par Sportstats & Strava.</p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
